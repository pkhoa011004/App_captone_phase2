global:
  scrape_interval: 5s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:9464"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: triage-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["triage-engine:8080"]
