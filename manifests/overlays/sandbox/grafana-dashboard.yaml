apiVersion: v1
kind: ConfigMap
metadata:
  name: cdo-grafana-dashboard
  namespace: xbrain-cdo5-sandbox
  labels:
    grafana_dashboard: "1"
data:
  cdo-dashboard.json: |
    {
      "id": null,
      "title": "CDO Pipeline & Microservices Overview",
      "tags": ["cdo", "sandbox"],
      "style": "dark",
      "timezone": "browser",
      "editable": true,
      "hideControls": false,
      "graphTooltip": 1,
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP 5xx Error Rate",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "id": 1,
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status=~\"5..\"}[5m])) by (service)",
              "legendFormat": "{{service}}",
              "datasource": { "type": "prometheus" }
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "P95 Request Latency (ms)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "id": 2,
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)) * 1000",
              "legendFormat": "{{service}}",
              "datasource": { "type": "prometheus" }
            }
          ]
        },
        {
          "type": "logs",
          "title": "Live Application Logs (Loki)",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 8 },
          "id": 3,
          "targets": [
            {
              "expr": "{namespace=\"xbrain-cdo5-sandbox\"}",
              "legendFormat": "",
              "datasource": { "type": "loki", "uid": "Loki" }
            }
          ],
          "options": {
            "showLabels": true,
            "wrapLogMessage": true,
            "enableLogDetails": true
          }
        }
      ],
      "schemaVersion": 36,
      "version": 1
    }
